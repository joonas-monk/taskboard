# TaskBoard Nginx reverse proxy configuration
# Copy to /etc/nginx/sites-available/taskboard and replace yourdomain.com with your actual domain.
# Then run: sudo ln -s /etc/nginx/sites-available/taskboard /etc/nginx/sites-enabled/
# After Certbot runs (sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com),
# it will modify this file to add SSL certificate directives automatically.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates — filled in by Certbot after running:
    # sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Increase upload/body size if AI pipeline returns large responses
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Extended timeouts — AI pipeline Server Actions can take 30-120 seconds
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
